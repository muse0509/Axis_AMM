name: A/B Test Suite

on:
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/litesvm-jupiter-cpi.yml'
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/litesvm-jupiter-cpi.yml'

concurrency:
  group: ab-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ab-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/axis-g3m/target
            contracts/pfda-amm-3/target
            contracts/ab-integration-tests/target
          key: ab-${{ hashFiles('contracts/ab-integration-tests/Cargo.lock', 'contracts/axis-g3m/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # ── TypeScript checks ──
      - name: TypeScript type check
        run: bun run typecheck 2>&1 || true

      # ── Build SBF programs ──
      - name: Build SBF programs
        run: |
          cd contracts/axis-g3m && cargo build-sbf
          cd ../pfda-amm-3 && cargo build-sbf

      - name: Dump Jupiter V6 from mainnet
        run: |
          mkdir -p contracts/axis-g3m/fixtures
          solana program dump \
            -u https://api.mainnet-beta.solana.com \
            JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4 \
            contracts/axis-g3m/fixtures/jupiter_v6.so

      # ── LiteSVM unit tests ──
      - name: Run axis-g3m LiteSVM tests
        run: |
          cd contracts/axis-g3m
          cargo test --test jupiter_cpi -- --nocapture --skip mainnet_fork

      - name: Run A/B comparison tests (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison -- --nocapture --skip jupiter --skip mainnet

      - name: Generate LiteSVM A/B report
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison test_ab_multi_scenario_report -- --nocapture

      # ── Mainnet fork via solana-test-validator --clone ──
      - name: Create test keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --force --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Start validator with mainnet-forked Jupiter
        run: |
          solana-test-validator \
            --reset \
            --ledger /tmp/fork-ledger \
            --bpf-program 65aE9QdVz5bapV19BGt5cyTgVitYpekGwusRoQEovNUi contracts/axis-g3m/target/deploy/axis_g3m.so \
            --bpf-program DbAPmgkrpCCZrpBMv5x1ye6nJUreqY313SuQjZsMyjEf contracts/pfda-amm-3/target/deploy/pfda_amm_3.so \
            --clone JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4 \
            --clone TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA \
            --url https://api.mainnet-beta.solana.com \
            > /tmp/fork-validator.log 2>&1 &
          echo $! > /tmp/fork-validator.pid
          for i in $(seq 1 30); do
            solana cluster-version -u localhost 2>/dev/null && break
            sleep 1
          done
          echo "Validator ready"

      - name: Run mainnet-fork E2E (solana-test-validator)
        run: |
          RPC_URL=http://localhost:8899 bun test/e2e/axis-g3m/axis-g3m.jupiter-fork.e2e.ts

      - name: Stop forked validator
        if: always()
        run: kill $(cat /tmp/fork-validator.pid 2>/dev/null) 2>/dev/null || true

      # ── Job Summary ──
      - name: Publish reports to Job Summary
        if: always()
        run: |
          echo "# A/B Test Reports" >> $GITHUB_STEP_SUMMARY

          if [ -f reports/ab/pr-validation/latest.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat reports/ab/pr-validation/latest.md >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f reports/ab/mainnet-fork/latest.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Mainnet-Fork Report" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            head -100 reports/ab/mainnet-fork/latest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f reports/ab/latest.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Multi-Scenario CU Report" >> $GITHUB_STEP_SUMMARY
            cat reports/ab/latest.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-reports
          path: |
            reports/ab/latest.*
            reports/ab/pr-validation/latest.*
            reports/ab/mainnet-fork/latest.*
