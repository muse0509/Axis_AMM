name: LiteSVM Jupiter CPI Tests

on:
  push:
    branches: [feat/jupiter-cpi]
  pull_request:
    branches: [main]
    paths:
      - 'contracts/axis-g3m/**'
      - 'contracts/pfda-amm-3/**'
      - 'contracts/ab-integration-tests/**'

jobs:
  litesvm-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/axis-g3m/target
            contracts/pfda-amm-3/target
            contracts/ab-integration-tests/target
          key: litesvm-${{ hashFiles('contracts/ab-integration-tests/Cargo.lock', 'contracts/axis-g3m/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build SBF programs
        run: |
          cd contracts/axis-g3m && cargo build-sbf
          cd ../pfda-amm-3 && cargo build-sbf

      - name: Dump Jupiter V6 from mainnet
        run: |
          mkdir -p contracts/axis-g3m/fixtures
          solana program dump \
            -u https://api.mainnet-beta.solana.com \
            JUP6LkbZbjS1jKKwapdHNy74zcZ3tLUZoi5QNyVTaV4 \
            contracts/axis-g3m/fixtures/jupiter_v6.so

      # ── axis-g3m per-program tests ──
      - name: Run axis-g3m LiteSVM tests
        run: |
          cd contracts/axis-g3m
          cargo test --test jupiter_cpi -- --nocapture --skip mainnet_fork

      # ── A/B comparison tests (no network) ──
      - name: Run A/B comparison tests (local)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison -- --nocapture --skip jupiter

      # ── Multi-scenario report generation ──
      - name: Generate A/B report (LiteSVM)
        run: |
          cd contracts/ab-integration-tests
          cargo test --test ab_comparison test_ab_multi_scenario_report -- --nocapture

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-report
          path: reports/ab/latest.*

      # ── Mainnet fork tests (Jupiter CPI + A/B) ──
      - name: Run mainnet fork PR validation
        env:
          MAINNET_RPC_URL: https://api.mainnet-beta.solana.com
          AB_FORK_REPEATS: "3"
        run: |
          cd contracts/axis-g3m
          cargo test --test jupiter_cpi test_jupiter_rebalance_mainnet_fork -- --nocapture --ignored
          cd ../ab-integration-tests
          cargo test --test ab_comparison test_ab_pr_validation_mainnet_fork -- --nocapture --ignored

      - name: Publish mainnet-fork report to Job Summary
        if: always()
        run: |
          if [ -f reports/ab/mainnet-fork/latest.json ]; then
            echo "## Mainnet-Fork A/B Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/ab/mainnet-fork/latest.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish LiteSVM PR validation to Job Summary
        if: always()
        run: |
          if [ -f reports/ab/pr-validation/latest.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat reports/ab/pr-validation/latest.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ab-reports
          path: |
            reports/ab/latest.*
            reports/ab/pr-validation/latest.*
            reports/ab/mainnet-fork/latest.*
