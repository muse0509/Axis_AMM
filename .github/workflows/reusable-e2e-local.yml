name: Reusable Local E2E

on:
  workflow_call:

permissions:
  contents: read

jobs:
  local-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Set up Rust
        run: bash ci/setup-rust.sh

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            contracts/pfda-amm/target
            contracts/pfda-amm-3/target
            contracts/axis-g3m/target
            contracts/axis-vault/target
            solana-tfmm-rs/target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: solana-cli-${{ runner.os }}-stable-v1

      - name: Install Solana CLI
        run: bash ci/install-solana.sh

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Prepare local validator
        run: bash ci/e2e-local-prepare.sh

      - name: Run PFDA AMM Legacy local e2e
        run: bun run e2e:pfda-amm-legacy:local

      - name: Run PFDA AMM 3 local e2e
        run: bun run e2e:pfda-amm-3:local

      - name: Run Axis G3M local e2e
        run: bun run e2e:axis-g3m:local

      - name: Run Axis Vault local e2e
        run: bun run e2e:axis-vault:local

      - name: Run AB CU benchmark (local validator)
        run: bun run bench:ab

      - name: Dump validator log on failure
        if: failure()
        run: |
          test -f /tmp/solana-test-validator.log && cat /tmp/solana-test-validator.log

      - name: Stop local validator
        if: always()
        run: bash ci/e2e-local-cleanup.sh
