name: Main AB Report

on:
  push:
    branches:
      - main
    paths-ignore:
      - "reports/**"

concurrency:
  group: main-ab-report-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-ab-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: solana-cli-${{ runner.os }}-stable-v1

      - name: Install Solana CLI
        run: bash ci/install-solana.sh

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Configure devnet wallet
        env:
          SOLANA_DEVNET_KEYPAIR: ${{ secrets.SOLANA_DEVNET_KEYPAIR }}
        run: |
          mkdir -p "$HOME/.config/solana"
          if [[ -n "${SOLANA_DEVNET_KEYPAIR:-}" ]]; then
            printf '%s' "${SOLANA_DEVNET_KEYPAIR}" > "$HOME/.config/solana/id.json"
          else
            solana-keygen new --force --no-bip39-passphrase --silent -o "$HOME/.config/solana/id.json"
            solana -u devnet airdrop 2 || echo "Devnet airdrop failed; continuing with current balance."
          fi

      - name: Set devnet RPC
        run: solana config set --url devnet

      - name: Ensure devnet wallet funding
        run: bash ci/ensure-devnet-wallet-funded.sh 2

      - name: Generate AB markdown report
        run: bash ci/update-ab-report.sh

      - name: Commit and push report updates
        run: |
          if git diff --quiet -- reports/ab; then
            echo "No report updates to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ab
          git commit -m "chore(reports): refresh AB rehearsal markdown"
          git push
