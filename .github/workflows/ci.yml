name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "reports/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust Checks
    uses: ./.github/workflows/reusable-rust.yml

  typescript:
    name: TypeScript Checks
    uses: ./.github/workflows/reusable-typescript.yml

  local-e2e:
    name: Local Validator E2E
    needs:
      - rust
      - typescript
    uses: ./.github/workflows/reusable-e2e-local.yml
    with:
      suite: e2e

  local-benchmark-ab:
    name: Local Validator AB Benchmark
    needs:
      - local-e2e
    uses: ./.github/workflows/reusable-e2e-local.yml
    with:
      suite: benchmark
